<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipment Rental</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; font-size: 0.9rem; }
    select, input { width: 100%; padding: 8px; font-size: 1rem; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 16px; font-size: 1rem; cursor: pointer; }
    .total { margin-top: 16px; font-size: 1.2rem; font-weight: 700; }
    .message { margin-top: 16px; padding: 10px; border-radius: 6px; }
    .ok { background: #e6f4ea; color: #1e7e34; }
    .err { background: #fdecea; color: #c0392b; }
    .booking-panel { margin-top: 16px; padding: 12px; border: 1px solid #d9d9d9; border-radius: 8px; background: #fafafa; }
    .booking-panel ul { padding-left: 20px; margin: 8px 0 0; }
    .booking-panel li { margin-bottom: 8px; }
    .muted { color: #666; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Book Equipment</h1>

  <label for="equipment">Equipment</label>
  <select id="equipment"></select>

  <label for="customer">Customer name</label>
  <input id="customer" type="text" placeholder="e.g. Jane Doe" />

  <label for="from">Start date</label>
  <input id="from" type="date" />

  <label for="to">End date</label>
  <input id="to" type="date" />

  <div class="total" id="total">Total: PHP 0.00</div>

  <button id="book">Create booking</button>

  <div id="maintenancePanel" class="booking-panel" style="display: none;"></div>

  <div class="booking-panel">
    <strong>Existing bookings</strong>
    <p id="bookingStatus" class="muted">Select an equipment item to see confirmed bookings.</p>
    <ul id="bookingList"></ul>
  </div>

  <div id="message"></div>

  <script>
    let equipmentList = [];
    let bookings = [];

    async function loadEquipment() {
      const res = await fetch("/api/equipment");
      equipmentList = await res.json();
      const select = document.getElementById("equipment");
      select.innerHTML = "";
      equipmentList.forEach(item => {
        if (item.status === "maintenance") return;
        const opt = document.createElement("option");
        opt.value = item.id;
        opt.textContent = `${item.name} (PHP ${item.daily_rate}/day)`;
        select.appendChild(opt);
      });
      renderMaintenanceSection();
    }

    function selectedEquipment() {
      const id = Number(document.getElementById("equipment").value);
      return equipmentList.find(e => e.id === id);
    }

    async function loadBookings() {
      const res = await fetch("/api/bookings");
      const allBookings = await res.json();
      bookings = allBookings.filter(booking => booking.status !== "cancelled");
      renderBookings();
    }

    function parseDate(value) {
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatDate(value) {
      const date = parseDate(value);
      return date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function addDays(value, delta) {
      const date = parseDate(value);
      date.setDate(date.getDate() + delta);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function dayCount(from, to) {
      // Rentals are billed inclusively: both start and end day count.
      const ms = new Date(to) - new Date(from);
      return Math.round(ms / (1000 * 60 * 60 * 24)) + 1;
    }

    function calculateTotal(dailyRate, days) {
      const baseTotal = dailyRate * days;
      const discountApplied = days >= 7;
      const total = discountApplied ? baseTotal * 0.9 : baseTotal;
      return { total, discountApplied };
    }

    function renderMaintenanceSection() {
      const panel = document.getElementById("maintenancePanel");
      const maintenanceItems = equipmentList.filter(item => item.status === "maintenance");

      if (maintenanceItems.length === 0) {
        panel.innerHTML = "";
        panel.style.display = "none";
        return;
      }

      panel.style.display = "block";
      panel.innerHTML = `
        <strong>Equipment under maintenance</strong>
        <ul>
          ${maintenanceItems.map(item => `<li>${item.name} — under maintenance, unavailable for booking</li>`).join("")}
        </ul>
      `;
    }

    function renderBookings() {
      const equipment = selectedEquipment();
      const statusEl = document.getElementById("bookingStatus");
      const listEl = document.getElementById("bookingList");

      if (!equipment) {
        statusEl.textContent = "Select an equipment item to see confirmed bookings.";
        listEl.innerHTML = "";
        return;
      }

      const equipmentBookings = bookings
        .filter(booking => booking.equipment_id === equipment.id)
        .sort((a, b) => a.from_date.localeCompare(b.from_date));

      if (equipmentBookings.length === 0) {
        statusEl.textContent = `No confirmed bookings for ${equipment.name}.`;
        listEl.innerHTML = "";
        return;
      }

      statusEl.textContent = `Confirmed bookings for ${equipment.name}:`;
      listEl.innerHTML = "";

      equipmentBookings.forEach(booking => {
        const li = document.createElement("li");
        if (booking.from_date === booking.to_date) {
          li.innerHTML = `<strong>${formatDate(booking.from_date)}</strong><br />${formatDate(booking.from_date)} — fully booked and also a same-day turnover boundary.`;
        } else {
          const previousDay = addDays(booking.to_date, -1);
          li.innerHTML = `<strong>${formatDate(booking.from_date)} to ${formatDate(booking.to_date)}</strong><br />${formatDate(booking.from_date)} to ${formatDate(previousDay)} — fully unavailable; ${formatDate(booking.to_date)} — same-day turnover boundary (a new booking may start here).`;
        }
        listEl.appendChild(li);
      });
    }

    function updateTotal() {
      const equipment = selectedEquipment();
      const from = document.getElementById("from").value;
      const to = document.getElementById("to").value;
      const totalEl = document.getElementById("total");

      if (!equipment || !from || !to) {
        totalEl.textContent = "Total: PHP 0.00";
        return;
      }
      const days = dayCount(from, to);
      if (days < 1) {
        totalEl.textContent = "Total: PHP 0.00";
        return;
      }
      const { total, discountApplied } = calculateTotal(equipment.daily_rate, days);
      const discountText = discountApplied
        ? ", 10% long-rental discount applied"
        : "";
      totalEl.textContent = `Total: PHP ${total.toFixed(2)} (${days} day${days > 1 ? "s" : ""}${discountText})`;
    }

    async function createBooking() {
      const messageEl = document.getElementById("message");
      messageEl.className = "";
      messageEl.textContent = "";

      const body = {
        equipment_id: Number(document.getElementById("equipment").value),
        customer: document.getElementById("customer").value,
        from_date: document.getElementById("from").value,
        to_date: document.getElementById("to").value,
      };

      const res = await fetch("/api/bookings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();

      if (res.ok) {
        messageEl.className = "message ok";
        messageEl.textContent = `Booked! Total PHP ${data.total.toFixed(2)}.`;
        await loadBookings();
      } else {
        messageEl.className = "message err";
        messageEl.textContent = data.error;
      }
    }

    document.getElementById("equipment").addEventListener("change", () => {
      updateTotal();
      renderBookings();
    });
    document.getElementById("from").addEventListener("change", updateTotal);
    document.getElementById("to").addEventListener("change", updateTotal);
    document.getElementById("book").addEventListener("click", createBooking);

    async function init() {
      await loadEquipment();
      await loadBookings();
      updateTotal();
    }

    init();
  </script>
</body>
</html>
